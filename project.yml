name: Glaze
options:
  bundleIdPrefix: com.fran
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
targets:
  Glaze:
    type: application
    platform: macOS
    sources: [Glaze]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fran.glaze
        INFOPLIST_FILE: Glaze/Resources/Info.plist
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_NAME: Glaze
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
  GlazeTests:
    type: bundle.unit-test
    platform: macOS
    sources: [GlazeTests]
    dependencies:
      - target: Glaze
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
